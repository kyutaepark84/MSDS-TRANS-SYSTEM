<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>MSDS 현장경고표지·관리요령 PPT 생성기</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    color-scheme: light dark;
  }
  body {
    font-family: "Malgun Gothic", "맑은 고딕", -apple-system, BlinkMacSystemFont, sans-serif;
    max-width: 720px;
    margin: 48px auto;
    padding: 0 20px;
    line-height: 1.6;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 4px;
  }
  p.lead {
    color: #666;
    margin-top: 0;
  }
  .card {
    border: 1px solid #d9d9d9;
    border-radius: 10px;
    padding: 24px;
    margin-top: 20px;
  }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
  }
  input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    padding: 8px;
    margin-bottom: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  button#generateBtn {
    background: #1a5fb4;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
  }
  button#generateBtn:hover {
    background: #144a8c;
  }
  .status {
    margin-top: 14px;
    font-size: 14px;
    color: #333;
  }
  .status.error {
    color: #c01c28;
  }
  .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-top: 1px solid #eee;
  }
  .result-row button {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #1a5fb4;
    background: white;
    color: #1a5fb4;
    cursor: pointer;
  }
  .note {
    font-size: 13px;
    color: #777;
    margin-top: 24px;
  }
  .upload-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .btn-choose {
    display: inline-block;
    padding: 8px 16px;
    border: 1px solid #1a5fb4;
    border-radius: 6px;
    background: white;
    color: #1a5fb4;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 0;
  }
  .btn-choose:hover {
    background: rgba(26, 95, 180, 0.06);
  }
  .upload-toolbar-hint {
    font-size: 12px;
    color: #888;
  }
  .dropzone {
    border: 2px dashed #b6b6b6;
    border-radius: 8px;
    padding: 36px 16px;
    margin-bottom: 16px;
    text-align: center;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease, background-color 0.15s ease;
  }
  .dropzone.dragover {
    border-color: #1a5fb4;
    background: rgba(26, 95, 180, 0.06);
  }
  .dropzone-empty {
    display: block;
    width: 100%;
    cursor: pointer;
  }
  .dropzone-icon {
    font-size: 42px;
    margin-bottom: 10px;
  }
  .dropzone-text {
    font-size: 15px;
    color: #666;
  }
  .dropzone-subtext {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }
  .dropzone-file {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
  }
  .dropzone-file-icon {
    font-size: 22px;
    flex-shrink: 0;
  }
  .dropzone-file-name {
    font-size: 14px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .dropzone-file-size {
    font-size: 12px;
    color: #888;
    flex-shrink: 0;
  }
  .dropzone-file-remove {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid #ccc;
    background: white;
    color: #666;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
  }
  .dropzone-file-remove:hover {
    border-color: #c01c28;
    color: #c01c28;
  }
  /* hidden 속성과 .dropzone-empty/.dropzone-file 의 display 선언이 명세(specificity)가
     같아서 나중에 정의된 클래스 규칙이 hidden을 덮어쓰는 문제가 있어, 명시적으로
     다시 감춘다. */
  .dropzone-empty[hidden],
  .dropzone-file[hidden] {
    display: none;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #eee; background: #1e1e1e; }
    p.lead, .note, .upload-toolbar-hint, .dropzone-text, .dropzone-subtext, .dropzone-file-size { color: #aaa; }
    .card { border-color: #444; }
    input { background: #2a2a2a; color: #eee; border-color: #555; }
    .result-row { border-color: #333; }
    .dropzone { border-color: #555; }
    .dropzone.dragover { border-color: #4a90e2; background: rgba(74, 144, 226, 0.1); }
    .btn-choose { background: #2a2a2a; border-color: #4a90e2; color: #4a90e2; }
    .btn-choose:hover { background: rgba(74, 144, 226, 0.1); }
    .dropzone-file-remove { background: #2a2a2a; border-color: #555; color: #ccc; }
  }
</style>
</head>
<body>

<h1>MSDS 현장경고표지·관리요령 PPT 생성기</h1>
<p class="lead">MSDS(물질안전보건자료) PDF를 올리면 현장경고표지(GHS 라벨)와 관리요령 PPT 2종을 자동으로 만들어 드립니다. 브라우저 안에서만 처리되며 파일이 서버로 전송되지 않습니다.</p>

<div class="card">
  <label for="pdfInput">MSDS PDF 파일</label>
  <div class="upload-toolbar">
    <label class="btn-choose" for="pdfInput">파일 선택</label>
    <span class="upload-toolbar-hint">PDF 파일 1개</span>
  </div>
  <input type="file" id="pdfInput" accept="application/pdf" class="visually-hidden" />
  <div class="dropzone" id="dropzone">
    <label class="dropzone-empty" id="dropzoneEmpty" for="pdfInput">
      <div class="dropzone-icon">📄</div>
      <div class="dropzone-text">이 영역을 클릭하거나 파일을 끌어다 놓으세요</div>
      <div class="dropzone-subtext">Drag &amp; Drop 지원</div>
    </label>
    <div class="dropzone-file" id="dropzoneFile" hidden>
      <span class="dropzone-file-icon">📄</span>
      <span class="dropzone-file-name" id="fileNameText"></span>
      <span class="dropzone-file-size" id="fileSizeText"></span>
      <button type="button" class="dropzone-file-remove" id="fileRemoveBtn" title="제거">✕</button>
    </div>
  </div>

  <label for="seqInput">사내 관리번호 (선택, 예: 21)</label>
  <input type="text" id="seqInput" placeholder="비워두면 번호 없이 생성됩니다" />

  <button id="generateBtn">PPT 생성</button>
  <div class="status" id="status"></div>

  <div id="results"></div>
</div>

<p class="note">
  ※ 산업안전보건법 표준 16개 항목(KOSHA 서식) MSDS를 기준으로 자동 추출한 초안입니다.
  인쇄·배포 전 안전보건 담당자의 검토가 필요합니다. 그림문자는 최대 3개까지 표시됩니다.
</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="assets_data.js"></script>
<script src="ghs.js"></script>
<script src="msds_parser.js"></script>
<script src="ppt_builder.js"></script>
<script src="app.js"></script>
</body>
</html>
